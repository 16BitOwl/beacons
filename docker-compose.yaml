name: beacons

# Quick start:
#   1. Copy beacons.example.yaml to beacons.yaml and prepare in your upstreams and config
#   2. Copy .env.example to .env and fill in your API tokens/passwords
#   3. Run: docker compose up -d
#
# Tip: set dry_run: true in beacons.yaml on first run to verify records
#      are discovered correctly before anything is pushed to your DNS providers.

services:
  beacons:
    build: .
    container_name: beacons
    restart: unless-stopped
    env_file:
      - .env                              # API tokens and passwords (see beacons.example.yaml)
    environment:
      - BEACONS_LOG_LEVEL=info
      - BEACONS_LOG_FORMAT=text
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Docker socket for container label discovery
      - ./beacons.yaml:/beacons.yaml:ro               # Main config file
      - ./config:/config:ro                           # Static YAML record files (optional)
      - ./data:/data                                  # Persistent state — remove if using memory store (optional)
    command: ["-config", "/beacons.yaml"]
    ports:
      - "9090:9090"                       # /healthz and /metrics — remove if not needed
    healthcheck:
      test: ["CMD", "/beacons", "-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
