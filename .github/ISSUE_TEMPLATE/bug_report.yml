name: Bug report
description: Report a problem with Beacons
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output (redact secrets/tokens)
      render: shell

  - type: input
    id: version
    attributes:
      label: Beacons version / commit
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, deployment method (Docker, binary, etc.), and any other relevant config
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else worth including
