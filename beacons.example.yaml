# Logging is configured via environment variables only, so it takes effect
# before the config file is parsed. These two are not available as YAML fields.
#
#   BEACONS_LOG_LEVEL   debug | info | warn | error  (default: info)
#   BEACONS_LOG_FORMAT  text | json                  (default: text)
#
# All other config fields can be overridden via environment variables without
# modifying this file. Variables follow the pattern BEACONS_<YAML_PATH>, where
# path segments are joined with single underscores:
#
#   BEACONS_SYNC_DRY_RUN=true
#   BEACONS_DEFAULTS_TTL=60
#   BEACONS_HTTP_ADDR=:9091
#
# Map keys (upstreams, sources) use double-underscore delimiters around the key:
#
#   BEACONS_UPSTREAMS__CF_ZONE_A__API_TOKEN=abc123
#   BEACONS_SOURCES__DOCKER_LOCAL__HOST=tcp://10.0.0.1:2375
#
# Values inside the config file can also reference environment variables using
# ${VAR} syntax. Set strict_env: true to fail on startup if any are unset.

defaults:
  ttl: 300
  comment: "managed by beacons"  # applied to all records unless overridden per-record or per-upstream

http:
  addr: ":9090"       # expose HTTP endpoints; omit or leave empty to disable
  read_timeout: 5     # read timeout in seconds; 0 or omit to disable
  idle_timeout: 30    # idle timeout in seconds; 0 or omit to disable
  write_timeout: 10   # write timeout in seconds; 0 or omit to disable
  shutdown_timeout: 5 # server shutdown timeout in seconds, must be larger than 0
  auth:
    type: api_key     # "api_key" (default) or "none"; protects secured endpoints
    api_key: ""       # shared secret sent via the X-API-Key header; if empty, a
                      # random key is generated and printed to stdout on startup

store:
  type: file   # "memory" (default) or "file"
  path: /data/beacons-state.json  # only used when type is "file"

sync:
  poll_interval: 600  # Docker poll interval in seconds; 0 or omit to disable
  retry_interval: 10  # retry failed records in seconds; 0 or omit to disable
  debounce_ms: 500    # collapse rapid container events after x ms of quiet; 0 to disable
  use_events: true    # also watch Docker events in real-time
  dry_run: false      # set to true to log instead of apply
  strict_env: false   # set to true to fail on missing env vars

# Sources define where DNS records come from. Each entry is a named instance —
# the name is arbitrary but must be unique. You can define multiple sources of
# the same type (e.g. two Docker hosts or multiple YAML globs).
sources:
  docker-local:
    type: docker
    host: unix:///var/run/docker.sock

  static-records:
    type: yaml
    glob: /config/*.yaml

# Upstreams define where DNS records are pushed to. Each entry is a named
# instance — the name is arbitrary but must be unique, and is referenced from
# container labels and static YAML records to control which upstream a record
# targets. You can define multiple instances of the same type (e.g. two
# Cloudflare zones, or a Cloudflare zone alongside a Pi-hole).
upstreams:
  cf-zone-a:
    type: cloudflare
    api_token: ${CF_API_TOKEN}
    zone_id: ${CF_ZONE_A_ID}
    http:
      retry_max_attempts: 3
      retry_base_delay_ms: 500
      retry_max_delay_ms: 30000
      # debug_log: true         # DEV ONLY: log full requests/responses; also needs BEACONS_LOG_LEVEL=debug
      # debug_log_secrets: true # DEV ONLY: logs tokens/passwords in plaintext — never in production

  cf-zone-b:
    type: cloudflare
    api_token: ${CF_API_TOKEN}
    zone_id: ${CF_ZONE_B_ID}
    http:
      retry_max_attempts: 5
      retry_base_delay_ms: 1000
      retry_max_delay_ms: 60000

  pihole-home:
    type: pihole
    url: ${PIHOLE_URL}
    password: ${PIHOLE_PASSWORD}
